<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
     <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete" />
     <script src="script.js"></script>
</head>
<body>
     <div class="app-container">
          <div class="header">
               <div>
                    <h2>Daily Habit Tracker</h2>
               </div>
               <div id="profile">
                    <img src="asset/user.png" alt="profile">
                    <label id="name" for="">Ajmal</label>
               </div>

          </div>
          <div class="progress-area">
               <h2>Progress bar</h2>
               <div class="progress-bar">
                    <div class="progress-track" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
                         <div class="progress-fill" style="width: 50%;"></div>
                    </div>
                    <div class="progress-label">
                         <span class="percentage">75%</span>
                    </div>
               </div>
               
          </div>

          <div class="input-area">
               <h2>Task Input</h2>
               <input id="input" type="text">
               <button onclick="addtaskList()" class="input-btn">Add Habit</button>
          </div>

          <div class="task-lists">
               <h2>Daily Checklist</h2>
          <ul id="taskList">
               <li id="templateItem" class="task-rows">
                    <label class="task-label">
                         <input class="check-box" type="checkbox" >
                         <span class="task-text"></span>
                    </label>
                    <button onclick="deletetaskList(this)" id="delete-btn">
                         <span class="material-symbols-outlined">delete</span>
                    </button>
               </li>
          </ul>
          </div>
     </div>
</body>
</html>
